      output_format: "html"
      stability: "static"

    # ── ETSI ESI standards ────────────────────────────────────────────────────
    - name: "etsi-esi"
      type: "etsi_portal"
      tb_id: "607;ESI"
      stability: "dynamic_medium"
      # spec_filter: ["TS 119 4", "EN 319"]  # uncomment to restrict to specific series

    # ── EU regulations ────────────────────────────────────────────────────────
    - name: "eidas2_regulation"
      type: "pdf"
      url: "https://www.europarl.europa.eu/doceo/document/TA-9-2024-0117_EN.pdf"
      version_date: "2024-02-29"
      output_format: "pdf"
      stability: "static"

    # ── GitHub repositories ───────────────────────────────────────────────────
    - name: "eudi-arf-docs"
      type: "github"
      repo_url: "https://github.com/eu-digital-identity-wallet/eudi-doc-architecture-and-reference-framework.git"
      branch: "main"
      stability: "highly_dynamic"

    - name: "eu-digital-identity-wallet"
      type: "github_org"
      org_name: "eu-digital-identity-wallet"
      include_forks: false
      include_archived: false
      language_filters:
          ["Kotlin", "Swift", "Java", "Python", "JavaScript", "TypeScript"]
      extract:
          - "*.md"
          - "*.txt"
          - "*.pdf"
          - "*.adoc"
          - "src/**/*.kt"
          - "src/**/*.swift"
      stability: "highly_dynamic"
      update_frequency: "daily"
