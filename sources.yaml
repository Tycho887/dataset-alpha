    - name: "rfc9449-dpop"
      type: "html"
      url: "https://datatracker.ietf.org/doc/html/rfc9449"
      output_format: "html"
      stability: "static"

    - name: "rfc5280-x509"
      type: "html"
      url: "https://datatracker.ietf.org/doc/html/rfc5280"
      output_format: "html"
      stability: "static"

    - name: "rfc3161-tsp"
      type: "html"
      url: "https://datatracker.ietf.org/doc/html/rfc3161"
      output_format: "html"
      stability: "static"

    - name: "rfc6960-ocsp"
      type: "html"
      url: "https://datatracker.ietf.org/doc/html/rfc6960"
      output_format: "html"
      stability: "static"

    - name: "rfc5652-cms"
      type: "html"
