sources:
    # ── OIDF specifications ───────────────────────────────────────────────────
    - name: "openid4vci"
      type: "github"
      repo_url: "https://github.com/openid/OpenID4VCI.git"
      branch: "main"
      file_pattern: "**/*.md"
      stability: "highly_dynamic"

    - name: "openid4vp"
      type: "github"
      repo_url: "https://github.com/openid/OpenID4VP.git"
      branch: "main"
      file_pattern: "**/*.md"
      stability: "highly_dynamic"

    - name: "haip"
      type: "html"
      url: "https://openid.github.io/OpenID4VC-HAIP/openid4vc-high-assurance-interoperability-profile-wg-draft.html"
      version_date: "2025-11-19"
      output_format: "html"
      stability: "dynamic_medium"

    - name: "openid-connect-core"
      type: "html"
      url: "https://openid.net/specs/openid-connect-core-1_0.html"
      output_format: "html"
      stability: "static"

    - name: "openid-connect-discovery"
      type: "html"
      url: "https://openid.net/specs/openid-connect-discovery-1_0.html"
      output_format: "html"
      stability: "static"

    - name: "openid-connect-registration"
      type: "html"
      url: "https://openid.net/specs/openid-connect-registration-1_0.html"
      output_format: "html"
      stability: "static"

    - name: "openid-federation"
      type: "html"
      url: "https://openid.net/specs/openid-federation-1_0.html"
      output_format: "html"
      stability: "dynamic_low"

    # ── IETF drafts ───────────────────────────────────────────────────────────
    - name: "sd-jwt-draft"
      type: "github"
      repo_url: "https://github.com/oauth-wg/oauth-selective-disclosure-jwt.git"
      branch: "main"
      file_pattern: "*.md"
      stability: "highly_dynamic"

    - name: "sd-jwt-vc-draft"
      type: "github"
      repo_url: "https://github.com/oauth-wg/oauth-sd-jwt-vc.git"
      branch: "main"
      file_pattern: "*.md"
      stability: "highly_dynamic"

    # ── IETF RFCs ─────────────────────────────────────────────────────────────
    - name: "rfc7515-jws"
      type: "html"
      url: "https://datatracker.ietf.org/doc/html/rfc7515"
      output_format: "html"
      stability: "static"

    - name: "rfc7516-jwe"
      type: "html"
      url: "https://datatracker.ietf.org/doc/html/rfc7516"
      output_format: "html"
      stability: "static"

    - name: "rfc7517-jwk"
      type: "html"
      url: "https://datatracker.ietf.org/doc/html/rfc7517"
      output_format: "html"
      stability: "static"

    - name: "rfc7518-jwa"
      type: "html"
      url: "https://datatracker.ietf.org/doc/html/rfc7518"
      output_format: "html"
      stability: "static"

    - name: "rfc7519-jwt"
      type: "html"
      url: "https://datatracker.ietf.org/doc/html/rfc7519"
      output_format: "html"
      stability: "static"

    - name: "rfc8392-cwt"
      type: "html"
      url: "https://datatracker.ietf.org/doc/html/rfc8392"
      output_format: "html"
      stability: "static"

    - name: "rfc8747-pop"
      type: "html"
      url: "https://datatracker.ietf.org/doc/html/rfc8747"
      output_format: "html"
      stability: "static"

    - name: "rfc9126-par"
      type: "html"
      url: "https://datatracker.ietf.org/doc/html/rfc9126"
